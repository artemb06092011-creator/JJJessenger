<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>J Messenger</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:90%;
max-width:400px;
background:#1e293b;
padding:20px;
border-radius:20px;
text-align:center;
}

.logo{
font-size:80px;
font-weight:bold;
color:#60a5fa;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
cursor:pointer;
}

.hidden{
display:none;
}

</style>
</head>
<body>

<div id="login">

<div class="box">

<div class="logo">J</div>

<h2>J Messenger</h2>

<p>Соединяя людей мгновенно</p>

<p>
Для входа или регистрации аккаунта
подтвердите свою электронную почту.
</p>

<input
id="email"
type="email"
placeholder="Электронная почта"
>

<button onclick="sendLink()">
Продолжить
</button>

</div>

</div>

<div id="verify" class="hidden">

<div class="box">

<h2>Письмо отправлено</h2>

<p id="verifyText"></p>

<button onclick="checkLogin()">
Я подтвердил вход
</button>

</div>

</div>

<div id="createProfile" class="hidden">

<div class="box">

<h2>Создание профиля</h2>

<input id="name" placeholder="Имя">

<input id="username" placeholder="Username">

<button onclick="createProfile()">
Создать профиль
</button>

</div>

</div>

<div id="home" class="hidden">

<div class="box">

<h2>Главная</h2>

<input
id="search"
placeholder="Поиск пользователей"
>

<button onclick="openSettings()">
Настройки
</button>

</div>

</div>

<div id="settings" class="hidden">

<div class="box">

<h2>Настройки</h2>

<button>
📷 Изменить фото профиля
</button>

<button>
✏️ Изменить имя
</button>

<button onclick="logout()">
🚪 Выйти из аккаунта
</button>

<button onclick="backHome()">
Назад
</button>

</div>

</div>
  <script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
sendSignInLinkToEmail,
isSignInWithEmailLink,
signInWithEmailLink,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBI7VB0zTARMTKEj1tVr_VwzfoQ6bJw0x0",

authDomain: "jmessenger-519cf.firebaseapp.com",

projectId: "jmessenger-519cf",

storageBucket:
"jmessenger-519cf.firebasestorage.app",

messagingSenderId:
"339570238049",

appId:
"1:339570238049:web:01d8a317f99314ddefc020"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);
    window.sendLink = async function(){

const email =
document.getElementById("email").value;

const actionCodeSettings = {

url:
window.location.origin +
window.location.pathname,

handleCodeInApp:true

};

await sendSignInLinkToEmail(
auth,
email,
actionCodeSettings
);

localStorage.setItem(
"emailForSignIn",
email
);

document
.getElementById("login")
.classList.add("hidden");

document
.getElementById("verify")
.classList.remove("hidden");

document
.getElementById("verifyText")
.innerText =
"Мы отправили ссылку на:\n\n"+email;

};

if(
isSignInWithEmailLink(
auth,
window.location.href
)
){

let email =
localStorage.getItem(
"emailForSignIn"
);

if(!email){

email =
prompt("Введите email");

}

signInWithEmailLink(
auth,
email,
window.location.href
)
.then(async()=>{

const user =
auth.currentUser;

const snap =
await getDoc(
doc(
db,
"users",
user.uid
)
);

if(snap.exists()){

document
.getElementById("home")
.classList.remove("hidden");

}else{

document
.getElementById("createProfile")
.classList.remove("hidden");

}

});

}

window.createProfile =
async function(){

const user =
auth.currentUser;

const name =
document.getElementById("name").value;

const username =
document.getElementById("username").value;

await setDoc(
doc(
db,
"users",
user.uid
),
{
name,
username,
email:user.email,
avatar:"",
createdAt:Date.now()
}
);

document
.getElementById("createProfile")
.classList.add("hidden");

document
.getElementById("home")
.classList.remove("hidden");

};

window.checkLogin=function(){

alert(
"Перейдите по ссылке из письма."
);

};

window.openSettings=function(){

document
.getElementById("home")
.classList.add("hidden");

document
.getElementById("settings")
.classList.remove("hidden");

};

window.backHome=function(){

document
.getElementById("settings")
.classList.add("hidden");

document
.getElementById("home")
.classList.remove("hidden");

};

window.logout=
async function(){

await signOut(auth);

location.reload();

};

</script>

</body>
</html>
